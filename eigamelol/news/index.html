                border-radius: 4px;
                font-size: 14px;
                font-weight: bold;
                transition: all 0.2s ease-in-out;
            }

            #pagination button:hover:not(:disabled) {
                background-color: #e0e0e0;
                border-color: #999;
            }

            #pagination button:disabled {
                background-color: #007bff;
                color: #ffffff;
                border-color: #007bff;
