        <style>
            #grid {
                display: grid;
                grid-template-columns: repeat(9, 1fr);
                width: 100%;
                align-items: center;
            }
            #left {
                grid-area: 1 / 1 / 2 / 3;
                display: flex;
                flex-direction: column;
                justify-content: space-around;
                gap: 40px;
                justify-self: end;
            }
            #right {
                grid-area: 1 / 8 / 2 / 10;
                display: flex;
                flex-direction: column;
                justify-content: space-around;
                gap: 40px;
                justify-self: start;
            }
            #center {
                grid-area: 1 / 3 / 2 / 8;
                display: flex;
                justify-content: center;
                align-self: center;
            }
            #grid img {
                max-width: 100%;
                height: auto;
                display: block;
            }

            @media (max-width: 768px) {
                #grid {
                    display: grid;
                    grid-template-columns: repeat(2, 1fr);
                    gap: 30px 20px;
                    height: auto;
                }
                #center {
                    grid-column: 1 / 3;
                    order: 1;
                    justify-self: center;
                }

                #left,
                #right {
                    display: contents;
                }

                #grid > a,
                #left > a,
                #right > a {
                    grid-column: span 1;
                    justify-self: center;
                    margin: 0 auto;
                }

                #left > a:nth-child(1) {
                    order: 2;
                } /* Infinite scroll */
                #left > a:nth-child(2) {
                    order: 3;
                } /* Feed me! */
                #right > a:nth-child(1) {
                    order: 4;
                } /* Animation process */
                #right > a:nth-child(2) {
                    order: 5;
                } /* Random? */
            }
        </style>
    </head>
