<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>News & Blog JSON Generator</title>

<style>
*{box-sizing:border-box;}

body{
  font-family:Arial,sans-serif;
  padding:15px;
  background:#111;
  color:#fff;
  line-height:1.6;
  max-width:1200px;
  margin:0 auto;
}

input,textarea{
  width:100%;
  margin:8px 0;
  padding:12px;
  background:#222;
  color:#fff;
  border:1px solid #444;
  border-radius:6px;
}

textarea{
  height:150px;
  resize:vertical;
}

button{
  width:100%;
  padding:15px;
  background:#00bfff;
  color:#000;
  font-weight:bold;
  border:none;
  cursor:pointer;
  border-radius:6px;
  font-size:16px;
  margin-top:10px;
  transition:0.2s;
}

button:hover{background:#0099cc;}
button:active{transform:scale(0.97);}

#output{
  margin-top:20px;
  background:#000;
  padding:15px;
  border:1px solid #333;
  font-family:monospace;
  word-break:break-all;
}

#preview{
  margin-top:20px;
  padding:15px;
  background:#fff;
  color:#000;
  border:1px solid #333;
}

#preview img{
  max-width:100%;
}

.guide-container{
  display:flex;
  gap:15px;
  margin-top:10px;
}

.guide-box{
  flex:1;
  background:#1a1a1a;
  padding:15px;
  border:1px solid #333;
  border-radius:6px;
}

.guide-box h4{
  color:#00bfff;
  border-bottom:1px solid #333;
}

.guide-box pre{
  background:#000;
  padding:10px;
  font-size:13px;
}

@media(max-width:768px){
  .guide-container{flex-direction:column;}
}
</style>

</head>
<body>

<h2>News JSON Generator</h2>

<input id="id" type="number" placeholder="ID">
<input id="title" placeholder="Title">
<input id="desc" placeholder="Description">
<input id="img" placeholder="Image URL">

<textarea id="content"></textarea>

<button onclick="generate()">➕ Add JSON</button>
<button onclick="downloadJSON()">⬇ Download JSON</button>
<button onclick="clearAll()">🗑 Clear</button>

<h3>🔍 Preview</h3>
<div id="preview"></div>

<h3>📦 JSON Output</h3>
<pre id="output"></pre>

<hr>

<div class="guide-container">

<div class="guide-box">
<h4>Text</h4>
<pre>&lt;p&gt;text&lt;/p&gt;
&lt;br&gt;
&lt;hr&gt;</pre>

<h4>Heading</h4>
<pre>&lt;h1&gt;&lt;/h1&gt;
&lt;h2&gt;&lt;/h2&gt;</pre>
</div>

<div class="guide-box">
<h4>Style</h4>
<pre>&lt;strong&gt;&lt;/strong&gt;
&lt;em&gt;&lt;/em&gt;
&lt;u&gt;&lt;/u&gt;</pre>

<h4>List</h4>
<pre>&lt;ul&gt;&lt;li&gt;&lt;/li&gt;&lt;/ul&gt;</pre>
</div>

<div class="guide-box">
<h4>Link</h4>
<pre>&lt;a href=""&gt;&lt;/a&gt;</pre>

<h4>Image</h4>
<pre>&lt;img src=""&gt;</pre>
</div>

</div>

<script>
const contentInput = document.getElementById("content");
const preview = document.getElementById("preview");
const output = document.getElementById("output");

const idInput = document.getElementById("id");
const titleInput = document.getElementById("title");
const descInput = document.getElementById("desc");
const imgInput = document.getElementById("img");

let all = [];

// default template
contentInput.value = "<h2>Title</h2><p>Write here...</p>";
preview.innerHTML = contentInput.value;

// safe preview
contentInput.addEventListener("input", () => {
  preview.innerHTML = contentInput.value
    .replace(/<script[\s\S]*?>[\s\S]*?<\/script>/gi, "");
});

// escape JSON
function escapeJSON(str){
  return str
    .replace(/\\/g,'\\\\')
    .replace(/"/g,'\\"')
    .replace(/\n/g,'')
    .replace(/\r/g,'');
}

// generate
function generate(){
  let id = idInput.value;
  let title = titleInput.value;
  let desc = descInput.value;
  let img = imgInput.value;
  let content = contentInput.value;

  if(!id || !title){
    alert("Fill ID & Title");
    return;
  }

  const data = {
    id: id,
    title: escapeJSON(title),
    desc: escapeJSON(desc),
    content: escapeJSON(content),
    img: img,
    date: new Date().toISOString().split("T")[0]
  };

  all.push(data);

  output.textContent = JSON.stringify(all, null, 2);
}

// download
function downloadJSON(){
  if(all.length === 0){
    alert("No data");
    return;
  }

  const blob = new Blob(
    [JSON.stringify(all,null,2)],
    {type:"application/json"}
  );

  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "data.json";
  a.click();
}

// clear
function clearAll(){
  all = [];
  output.textContent = "";
}
</script>

</body>
</html>
