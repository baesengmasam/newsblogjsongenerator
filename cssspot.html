<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML CSS Spot Generator</title>

<style>
body{
  margin:0;
  padding:20px;
  background:#111;
  color:white;
  font-family:Arial,sans-serif;
  user-select:none;
  line-height:1.6;
}

h1{
  margin-top:0;
}

hr{
  border:none;
  border-top:1px solid #333;
  margin:30px 0;
}

.controls{
  margin-bottom:20px;
}

.portal-wrap{
  position:relative;
  display:inline-block;
  width:min(95vw,1000px);
  border:2px solid #444;
  overflow:hidden;
  touch-action:none;
}

.portal-img{
  display:block;
  width:100%;
  height:auto;
  min-height: 200px; 
  background: #222;
}

.spot{
  position:absolute;
  border:2px solid red;
  background:rgba(255,0,0,0.25);
  cursor:move;
  box-sizing:border-box;
  touch-action:none;
}

.resize-handle{
  position:absolute;
  width:14px;
  height:14px;
  background:white;
  border:1px solid black;
  right:-7px;
  bottom:-7px;
  cursor:nwse-resize;
}

.output{
  margin-top:20px;
}

textarea{
  width:100%;
  height:220px;
  background:#1b1b1b;
  color:#00ff99;
  border:1px solid #444;
  padding:10px;
  box-sizing:border-box;
  font-family:monospace;
  resize:vertical;
}

button{
  margin-top:10px;
  padding:10px 16px;
  cursor:pointer;
}
</style>
</head>
<body>

<h1>HTML CSS Spot Generator</h1><a href="index.html" style="text-align:right"><h2>News JSON generator</h2></a>

<div class="controls">
  <input type="file" id="upload" accept="image/*">
  <button id="addSpot">Add Spot</button>
</div>

<div class="portal-wrap" id="portalWrap">
  <img class="portal-img" id="portalImg">
</div>

<div class="output">
  <h2>Generated HTML</h2>
  <textarea id="htmlOutput" readonly></textarea>
  <button onclick="copyCode('htmlOutput')">Copy HTML</button>

  <h2>Generated CSS</h2>
  <textarea id="cssOutput" readonly></textarea>
  <button onclick="copyCode('cssOutput')">Copy CSS</button>
</div>

<br><br>
<h1>What is HTML CSS Spot Generator?</h1>
<p>
A simple visual hotspot editor for creating responsive image navigation using HTML and CSS.
</p>
<hr>

<script>
const upload = document.getElementById("upload");
const portalImg = document.getElementById("portalImg");
const portalWrap = document.getElementById("portalWrap");
const addSpotBtn = document.getElementById("addSpot");

const htmlOutput = document.getElementById("htmlOutput");
const cssOutput = document.getElementById("cssOutput");

let spots = [];

upload.addEventListener("change", e => {
  const file = e.target.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = event => {
    portalImg.src = event.target.result;
  };
  reader.readAsDataURL(file);
});

addSpotBtn.addEventListener("click", () => {
  createSpot(5, 5, 15, 15);
});

function createSpot(pctX, pctY, pctW, pctH){
  const spot = document.createElement("a");
  spot.className = "spot";

  const handle = document.createElement("div");
  handle.className = "resize-handle";

  spot.appendChild(handle);
  portalWrap.appendChild(spot);

  const data = {
    element: spot,
    pctX, pctY, pctW, pctH
  };

  spots.push(data);
  updateSpot(data);

  makeDraggable(data);
  makeResizable(data, handle);
  generateCode();
}

function updateSpot(data){
  data.element.style.left = data.pctX + "%";
  data.element.style.top = data.pctY + "%";
  data.element.style.width = data.pctW + "%";
  data.element.style.height = data.pctH + "%";

  generateCode();
}

function makeDraggable(data){
  let dragging = false;
  let offsetX = 0;
  let offsetY = 0;

  data.element.addEventListener("pointerdown", e => {
    if(e.target.classList.contains("resize-handle")) return;
    dragging = true;
    
    const spotRect = data.element.getBoundingClientRect();
    offsetX = e.clientX - spotRect.left;
    offsetY = e.clientY - spotRect.top;
    
    data.element.setPointerCapture(e.pointerId);
  });

  data.element.addEventListener("pointermove", e => {
    if(!dragging) return;

    const rect = portalWrap.getBoundingClientRect();
    const imgW = portalImg.clientWidth;
    const imgH = portalImg.clientHeight;

    let newPxX = e.clientX - rect.left - offsetX;
    let newPxY = e.clientY - rect.top - offsetY;

    const currentPxW = (data.pctW / 100) * imgW;
    const currentPxH = (data.pctH / 100) * imgH;

    newPxX = Math.max(0, Math.min(newPxX, imgW - currentPxW));
    newPxY = Math.max(0, Math.min(newPxY, imgH - currentPxH));

    data.pctX = (newPxX / imgW) * 100;
    data.pctY = (newPxY / imgH) * 100;

    updateSpot(data);
  });

  const stopDrag = (e) => {
    dragging = false;
    if(data.element.hasPointerCapture(e.pointerId)){
      data.element.releasePointerCapture(e.pointerId);
    }
  };

  data.element.addEventListener("pointerup", stopDrag);
  data.element.addEventListener("pointercancel", stopDrag);
}

function makeResizable(data, handle){
  let resizing = false;

  handle.addEventListener("pointerdown", e => {
    e.stopPropagation();
    resizing = true;
    handle.setPointerCapture(e.pointerId);
  });

  handle.addEventListener("pointermove", e => {
    if(!resizing) return;

    const rect = portalWrap.getBoundingClientRect();
    const imgW = portalImg.clientWidth;
    const imgH = portalImg.clientHeight;

    const startPxX = (data.pctX / 100) * imgW;
    const startPxY = (data.pctY / 100) * imgH;

    let newPxW = e.clientX - rect.left - startPxX;
    let newPxH = e.clientY - rect.top - startPxY;

    newPxW = Math.max(20, Math.min(newPxW, imgW - startPxX));
    newPxH = Math.max(20, Math.min(newPxH, imgH - startPxY));

    data.pctW = (newPxW / imgW) * 100;
    data.pctH = (newPxH / imgH) * 100;

    updateSpot(data);
  });

  const stopResize = (e) => {
    resizing = false;
    if(handle.hasPointerCapture(e.pointerId)){
      handle.releasePointerCapture(e.pointerId);
    }
  };

  handle.addEventListener("pointerup", stopResize);
  handle.addEventListener("pointercancel", stopResize);
}

function generateCode(){
  let html = `<div class="portal-wrap">\n\n`;
  html += `  <img src="portal.png" alt="menu" class="portal-img">\n\n`;

  spots.forEach((spot, index) => {
    const top = spot.pctY.toFixed(1);
    const left = spot.pctX.toFixed(1);
    const width = spot.pctW.toFixed(1);
    const height = spot.pctH.toFixed(1);

    html += `  <a href="/link${index+1}"\n`;
    html += `     class="spot"\n`;
    html += `     style="top:${top}%; left:${left}%; width:${width}%; height:${height}%;">\n`;
    html += `  </a>\n\n`;
  });

  html += `</div>`;
  htmlOutput.value = html;

  cssOutput.value = 
`.portal-wrap{
  position:relative;
  display:inline-block;
  width:100%;
  max-width:800px;
}

.portal-img{
  display:block;
  width:100%;
  height:auto;
}

.spot{
  position:absolute;
}`;
}

function copyCode(id){
  const textarea = document.getElementById(id);
  textarea.select();
  document.execCommand("copy");
  alert("Copied!");
}
</script>

</body>
</html>
